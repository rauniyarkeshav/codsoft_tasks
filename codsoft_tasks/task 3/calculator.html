<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:#222;
    padding:20px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

#display{
    width:100%;
    height:60px;
    font-size:28px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    background:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:18px;
    font-size:20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#444;
    color:white;
    transition:.3s;
}

button:hover{
    background:#666;
}

.operator{
    background:#ff9500;
}

.operator:hover{
    background:#e68900;
}

.equal{
    background:#28a745;
}

.equal:hover{
    background:#218838;
}

.clear{
    background:#dc3545;
}

.clear:hover{
    background:#c82333;
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear">C</button>
<button>⌫</button>
<button>%</button>
<button class="operator">/</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">*</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">-</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">+</button>

<button>0</button>
<button>.</button>
<button class="equal">=</button>

</div>

</div>

<script>

const display = document.getElementById("display");
const buttons = document.querySelectorAll("button");

buttons.forEach(button => {

button.addEventListener("click", function(){

let value = this.innerText;

if(value === "C"){
    display.value = "";
}

else if(value === "⌫"){
    display.value = display.value.slice(0,-1);
}

else if(value === "="){

    try{
        display.value = eval(display.value);
    }

    catch{
        display.value = "Error";
    }

}

else{
    display.value += value;
}

});

});

</script>

</body>
</html>
